<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BSA Alerta">
<title>BSA Alerta</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-user-select: none; user-select: none; }
body { display: flex; flex-direction: column; background: #0B0F10; }

#topbar {
  flex-shrink: 0; display: flex; align-items: center; gap: 12px;
  padding-top: max(16px, env(safe-area-inset-top));
  padding-bottom: 14px; padding-left: 18px; padding-right: 18px;
  background: rgba(0,0,0,0.4);
}
.btn-hub {
  width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12);
  color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center;
  text-decoration: none; flex: 0 0 auto;
}
#topbar h1 { font-size: 18px; font-weight: 800; color: #fff; }
#topbar .sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 1px; }

#stack {
  flex: 1; display: flex; flex-direction: column; gap: 12px;
  padding: 16px; padding-bottom: 8px;
}
.btn-sound {
  flex: 1; border: none; border-radius: 22px; display: flex; flex-direction: row;
  align-items: center; justify-content: center; gap: 14px;
  font-family: inherit; color: #fff; -webkit-appearance: none; appearance: none;
  transition: transform 0.08s ease; position: relative;
}
.btn-sound:active { transform: scale(0.97); }
.btn-sound .emoji { font-size: 40px; line-height: 1; }
.btn-sound .label { font-size: 17px; font-weight: 800; text-align: left; }
.btn-sound .label small { display:block; font-size:12px; font-weight:600; opacity:0.75; margin-top:2px; }
.btn-sound .tag {
  position: absolute; top: 10px; right: 14px; font-size: 10px; font-weight: 700;
  background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.85); padding: 3px 8px; border-radius: 20px;
}

#btn-erro      { background: linear-gradient(155deg, #8E5CD9, #6A3DB5); }
#btn-palmas1   { background: linear-gradient(155deg, #2FA8E0, #1B7DB5); }
#btn-palmas2   { background: linear-gradient(155deg, #FFB020, #E8871C); }
#btn-fail      { background: linear-gradient(155deg, #E85C5C, #B53D3D); }

#status {
  flex-shrink: 0; text-align: center; font-size: 12px; color: rgba(255,255,255,0.5);
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  padding-left: 16px; padding-right: 16px; word-break: break-word;
}
#status.erro { color: #FF6B6B; font-weight: 700; }
#status.pronto { color: #6BE07A; }
</style>
</head>
<body>

<div id="topbar">
  <a class="btn-hub" href="https://prcota57.github.io/BSA-cadastro/" title="Voltar ao início">&#8592;</a>
  <div>
    <h1>BSA Alerta</h1>
    <div class="sub">Sons para treino em campo</div>
  </div>
</div>

<div id="stack">
  <button class="btn-sound" id="btn-erro" type="button">
    <span class="emoji">&#9973;</span>
    <span class="label">Erro<small>ohh ouuu</small></span>
    <span class="tag">TESTE</span>
  </button>
  <button class="btn-sound" id="btn-fail" type="button">
    <span class="emoji">&#128308;</span>
    <span class="label">Fail<small>trombeta</small></span>
    <span class="tag">TESTE</span>
  </button>
  <button class="btn-sound" id="btn-palmas1" type="button">
    <span class="emoji">&#128079;</span>
    <span class="label">Palmas<small>simples</small></span>
  </button>
  <button class="btn-sound" id="btn-palmas2" type="button">
    <span class="emoji">&#127881;</span>
    <span class="label">Palmas<small>celebração</small></span>
  </button>
</div>

<div id="status">carregando...</div>

<script>
var statusEl = document.getElementById('status');
function setStatus(txt, tipo){
  statusEl.textContent = txt;
  statusEl.className = tipo || '';
}

/* captura qualquer erro de JS e mostra na tela, já que não dá pra ver o console no celular */
window.onerror = function(msg, url, linha){
  setStatus('Erro no app: ' + msg + ' (linha ' + linha + ')', 'erro');
  return false;
};

/* ---------- Wake Lock: mantém a tela acesa enquanto o módulo estiver aberto ---------- */
var wakeLock = null;
async function pedirWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){ /* dispositivo sem suporte — sem problema */ }
}
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible') pedirWakeLock();
});
pedirWakeLock();

/* ---------- Áudio ---------- */
var VERSAO = '3'; // aumentar a cada troca de som pra forçar o iPhone a baixar de novo
var arquivos = {
  erro:    'sounds/erro.wav?v=' + VERSAO,
  fail:    'sounds/fail-trombeta.wav?v=' + VERSAO,
  palmas1: 'sounds/palmas-simples.wav?v=' + VERSAO,
  palmas2: 'sounds/palmas-celebracao.wav?v=' + VERSAO
};

var modoSimples = false; // se o Web Audio falhar, usa <audio> comum como reserva
var sonsSimples = {};
var ctx, limiter;
var GANHO = 1.35;
var buffers = {};

try{
  var AudioCtx = window.AudioContext || window.webkitAudioContext;
  if(!AudioCtx) throw new Error('Web Audio não suportado');
  ctx = new AudioCtx();
  limiter = ctx.createDynamicsCompressor();
  limiter.threshold.value = -6;
  limiter.knee.value = 6;
  limiter.ratio.value = 12;
  limiter.attack.value = 0.001;
  limiter.release.value = 0.1;
  limiter.connect(ctx.destination);
}catch(e){
  modoSimples = true;
}

if(modoSimples){
  Object.keys(arquivos).forEach(function(k){
    sonsSimples[k] = new Audio(arquivos[k]);
    sonsSimples[k].preload = 'auto';
  });
  setStatus('pronto (modo simples)', 'pronto');
} else {
  var carregados = 0;
  var total = Object.keys(arquivos).length;
  var falhas = [];

  function carregarSom(chave, url){
    return fetch(url)
      .then(function(r){
        if(!r.ok) throw new Error('HTTP ' + r.status + ' em ' + url);
        return r.arrayBuffer();
      })
      .then(function(data){ return ctx.decodeAudioData(data); })
      .then(function(decoded){
        buffers[chave] = decoded;
        carregados++;
        setStatus('carregando sons... ' + carregados + '/' + total);
      })
      .catch(function(e){
        falhas.push(chave + ': ' + e.message);
      });
  }

  Promise.all(Object.keys(arquivos).map(function(k){ return carregarSom(k, arquivos[k]); }))
    .then(function(){
      if(falhas.length > 0){
        setStatus('Falha ao carregar: ' + falhas.join(' | '), 'erro');
      } else {
        setStatus('pronto ✓ (' + total + ' sons)', 'pronto');
      }
    });
}

function tocar(chave){
  if(modoSimples){
    var el = sonsSimples[chave];
    if(el){ el.currentTime = 0; el.play().catch(function(e){ setStatus('Não tocou: ' + e.message, 'erro'); }); }
    return;
  }
  if(ctx.state === 'suspended'){ ctx.resume(); }
  var buffer = buffers[chave];
  if(!buffer){ setStatus('Som ainda não carregou, aguarde...', 'erro'); return; }
  var source = ctx.createBufferSource();
  source.buffer = buffer;
  var gain = ctx.createGain();
  gain.gain.value = GANHO;
  source.connect(gain);
  gain.connect(limiter);
  source.start(0);
}

document.getElementById('btn-erro').addEventListener('click', function(){ tocar('erro'); });
document.getElementById('btn-fail').addEventListener('click', function(){ tocar('fail'); });
document.getElementById('btn-palmas1').addEventListener('click', function(){ tocar('palmas1'); });
document.getElementById('btn-palmas2').addEventListener('click', function(){ tocar('palmas2'); });
</script>
</body>
</html>
